<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">

  <!-- Background: deep wood brown rounded square -->
  <rect width="512" height="512" rx="90" fill="#2a1506"/>

  <!-- Subtle inner glow via layered rects -->
  <rect x="60" y="40" width="392" height="280" rx="60" fill="#3d1e08" opacity="0.5"/>

  <!-- ══ OUTER GOLD BORDER ══ -->
  <rect x="4" y="4" width="504" height="504" rx="88" fill="none" stroke="#c9993a" stroke-width="4"/>
  <rect x="12" y="12" width="488" height="488" rx="82" fill="none" stroke="#c9993a" stroke-width="1" opacity="0.4"/>

  <!-- ══ ROOF LAYER 1 (main roof) ══ -->
  <!-- Main roof body -->
  <polygon points="256,52 432,152 432,166 256,76 80,166 80,152" fill="#7a5010"/>
  <!-- Roof highlight ridge -->
  <polygon points="256,52 432,152 432,156 256,56 80,156 80,152" fill="#c9993a" opacity="0.6"/>
  <!-- Roof gold bottom edge -->
  <rect x="80" y="163" width="352" height="6" rx="1" fill="#c9993a"/>

  <!-- Left swallow-tail (翹脊) -->
  <path d="M80,155 Q52,144 34,156 Q40,162 56,158 Q68,155 80,162" fill="#7a5010"/>
  <path d="M80,155 Q52,144 34,156" stroke="#c9993a" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="34" cy="156" r="5" fill="#c9993a"/>

  <!-- Right swallow-tail -->
  <path d="M432,155 Q460,144 478,156 Q472,162 456,158 Q444,155 432,162" fill="#7a5010"/>
  <path d="M432,155 Q460,144 478,156" stroke="#c9993a" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="478" cy="156" r="5" fill="#c9993a"/>

  <!-- Roof peak ornament -->
  <ellipse cx="256" cy="50" rx="10" ry="13" fill="#c9993a"/>
  <ellipse cx="256" cy="48" rx="5" ry="6" fill="#f5e6a0"/>

  <!-- ══ ROOF LAYER 2 ══ -->
  <polygon points="256,170 408,238 408,250 256,184 104,250 104,238" fill="#6b4010"/>
  <rect x="104" y="247" width="304" height="5" rx="1" fill="#c9993a"/>

  <!-- ══ COLUMNS ══ -->
  <!-- Left column -->
  <rect x="112" y="250" width="24" height="180" rx="3" fill="#6b1010"/>
  <rect x="112" y="250" width="24" height="180" rx="3" fill="none" stroke="#c9993a" stroke-width="1.5" opacity="0.7"/>
  <rect x="108" y="244" width="32" height="10" rx="2" fill="#c9993a"/>
  <rect x="108" y="428" width="32" height="8" rx="2" fill="#c9993a"/>

  <!-- Right column -->
  <rect x="376" y="250" width="24" height="180" rx="3" fill="#6b1010"/>
  <rect x="376" y="250" width="24" height="180" rx="3" fill="none" stroke="#c9993a" stroke-width="1.5" opacity="0.7"/>
  <rect x="372" y="244" width="32" height="10" rx="2" fill="#c9993a"/>
  <rect x="372" y="428" width="32" height="8" rx="2" fill="#c9993a"/>

  <!-- ══ PLAQUE (匾額) ══ -->
  <rect x="148" y="260" width="216" height="92" rx="5" fill="#6b0f0f"/>
  <rect x="148" y="260" width="216" height="92" rx="5" fill="none" stroke="#c9993a" stroke-width="3"/>
  <rect x="156" y="268" width="200" height="76" rx="3" fill="none" stroke="#c9993a" stroke-width="1" opacity="0.5"/>

  <!-- 曾 character as geometric representation -->
  <!-- Top part of 曾 (日 shape) -->
  <rect x="218" y="276" width="76" height="24" rx="2" fill="none" stroke="#f0d890" stroke-width="3.5"/>
  <line x1="218" y1="288" x2="294" y2="288" stroke="#f0d890" stroke-width="3"/>
  <!-- Middle bar -->
  <line x1="210" y1="305" x2="302" y2="305" stroke="#f0d890" stroke-width="4"/>
  <!-- Bottom part (曰 shape) -->
  <rect x="210" y="308" width="92" height="32" rx="2" fill="none" stroke="#f0d890" stroke-width="3.5"/>
  <line x1="210" y1="323" x2="302" y2="323" stroke="#f0d890" stroke-width="2.5"/>

  <!-- ══ LANTERNS ══ -->
  <!-- Left lantern -->
  <line x1="136" y1="252" x2="136" y2="270" stroke="#c9993a" stroke-width="2"/>
  <ellipse cx="136" cy="286" rx="15" ry="21" fill="#8b1010"/>
  <ellipse cx="136" cy="286" rx="15" ry="21" fill="none" stroke="#c9993a" stroke-width="2"/>
  <!-- Lantern lines -->
  <line x1="122" y1="278" x2="150" y2="278" stroke="#c9993a" stroke-width="1" opacity="0.6"/>
  <line x1="122" y1="284" x2="150" y2="284" stroke="#c9993a" stroke-width="1" opacity="0.6"/>
  <line x1="122" y1="290" x2="150" y2="290" stroke="#c9993a" stroke-width="1" opacity="0.6"/>
  <line x1="122" y1="296" x2="150" y2="296" stroke="#c9993a" stroke-width="1" opacity="0.6"/>
  <!-- Lantern dot -->
  <circle cx="136" cy="307" r="4" fill="#c9993a"/>
  <!-- Lantern tassel -->
  <line x1="134" y1="311" x2="133" y2="322" stroke="#c9993a" stroke-width="1.5"/>
  <line x1="136" y1="311" x2="136" y2="324" stroke="#c9993a" stroke-width="1.5"/>
  <line x1="138" y1="311" x2="139" y2="322" stroke="#c9993a" stroke-width="1.5"/>
  <!-- Diamond shape on lantern (龍 hint) -->
  <polygon points="136,275 141,281 136,287 131,281" fill="#c9993a" opacity="0.8"/>

  <!-- Right lantern -->
  <line x1="376" y1="252" x2="376" y2="270" stroke="#c9993a" stroke-width="2"/>
  <ellipse cx="376" cy="286" rx="15" ry="21" fill="#8b1010"/>
  <ellipse cx="376" cy="286" rx="15" ry="21" fill="none" stroke="#c9993a" stroke-width="2"/>
  <line x1="362" y1="278" x2="390" y2="278" stroke="#c9993a" stroke-width="1" opacity="0.6"/>
  <line x1="362" y1="284" x2="390" y2="284" stroke="#c9993a" stroke-width="1" opacity="0.6"/>
  <line x1="362" y1="290" x2="390" y2="290" stroke="#c9993a" stroke-width="1" opacity="0.6"/>
  <line x1="362" y1="296" x2="390" y2="296" stroke="#c9993a" stroke-width="1" opacity="0.6"/>
  <circle cx="376" cy="307" r="4" fill="#c9993a"/>
  <line x1="374" y1="311" x2="373" y2="322" stroke="#c9993a" stroke-width="1.5"/>
  <line x1="376" y1="311" x2="376" y2="324" stroke="#c9993a" stroke-width="1.5"/>
  <line x1="378" y1="311" x2="379" y2="322" stroke="#c9993a" stroke-width="1.5"/>
  <!-- Diamond on right lantern -->
  <polygon points="376,275 381,281 376,287 371,281" fill="#c9993a" opacity="0.8"/>

  <!-- ══ INCENSE BURNER AREA ══ -->
  <rect x="140" y="358" width="232" height="68" rx="4" fill="#1a0d03"/>
  <rect x="140" y="358" width="232" height="68" rx="4" fill="none" stroke="#c9993a" stroke-width="1" opacity="0.5"/>

  <!-- Three incense sticks -->
  <rect x="249" y="326" width="3" height="55" rx="1" fill="#c9993a" opacity="0.85"/>
  <rect x="256" y="320" width="3" height="61" rx="1" fill="#c9993a" opacity="0.85"/>
  <rect x="263" y="326" width="3" height="55" rx="1" fill="#c9993a" opacity="0.85"/>

  <!-- Glowing tips (pure circles, no filter) -->
  <circle cx="250" cy="325" r="4" fill="#f5c030"/>
  <circle cx="257" cy="319" r="4" fill="#f5c030"/>
  <circle cx="264" cy="325" r="4" fill="#f5c030"/>
  <!-- Glow rings around tips -->
  <circle cx="250" cy="325" r="7" fill="none" stroke="#f5c030" stroke-width="1.5" opacity="0.4"/>
  <circle cx="257" cy="319" r="7" fill="none" stroke="#f5c030" stroke-width="1.5" opacity="0.4"/>
  <circle cx="264" cy="325" r="7" fill="none" stroke="#f5c030" stroke-width="1.5" opacity="0.4"/>

  <!-- Incense burner body -->
  <ellipse cx="256" cy="390" rx="32" ry="14" fill="#5a3008"/>
  <rect x="232" y="376" width="48" height="16" rx="3" fill="#4a2406"/>
  <ellipse cx="256" cy="376" rx="24" ry="7" fill="#6b3a0a"/>
  <!-- Rim gold ring -->
  <ellipse cx="256" cy="376" rx="24" ry="7" fill="none" stroke="#c9993a" stroke-width="2"/>
  <!-- Three legs -->
  <rect x="240" y="394" width="7" height="14" rx="2" fill="#3a1e04"/>
  <rect x="263" y="394" width="7" height="14" rx="2" fill="#3a1e04"/>
  <rect x="252" y="396" width="7" height="12" rx="2" fill="#3a1e04"/>
  <!-- Leg bases -->
  <rect x="237" y="406" width="13" height="4" rx="1" fill="#c9993a" opacity="0.7"/>
  <rect x="260" y="406" width="13" height="4" rx="1" fill="#c9993a" opacity="0.7"/>

  <!-- ══ STEPS ══ -->
  <rect x="104" y="424" width="304" height="11" rx="2" fill="#2e1508"/>
  <rect x="104" y="424" width="304" height="11" rx="2" fill="none" stroke="#c9993a" stroke-width="1" opacity="0.5"/>
  <rect x="82"  y="433" width="348" height="10" rx="2" fill="#261205"/>
  <rect x="82"  y="433" width="348" height="10" rx="2" fill="none" stroke="#c9993a" stroke-width="1" opacity="0.35"/>
  <rect x="58"  y="441" width="396" height="10" rx="2" fill="#1e0e04"/>

  <!-- ══ BOTTOM DECORATIVE BAR ══ -->
  <!-- Three diamonds representing 龍山派 -->
  <polygon points="196,465 204,472 196,479 188,472" fill="#c9993a"/>
  <polygon points="256,463 266,472 256,481 246,472" fill="#c9993a"/>
  <polygon points="316,465 324,472 316,479 308,472" fill="#c9993a"/>
  <!-- Lines connecting diamonds -->
  <line x1="204" y1="472" x2="246" y2="472" stroke="#c9993a" stroke-width="1.5" opacity="0.6"/>
  <line x1="266" y1="472" x2="308" y2="472" stroke="#c9993a" stroke-width="1.5" opacity="0.6"/>

  <!-- ══ CORNER CLOUD ORNAMENTS (geometric) ══ -->
  <!-- Top-left -->
  <path d="M32,72 Q44,58 56,66 M44,60 Q50,46 62,52 M52,50 Q60,38 72,46"
    stroke="#c9993a" stroke-width="2" fill="none" opacity="0.35" stroke-linecap="round"/>
  <!-- Top-right -->
  <path d="M480,72 Q468,58 456,66 M468,60 Q462,46 450,52 M460,50 Q452,38 440,46"
    stroke="#c9993a" stroke-width="2" fill="none" opacity="0.35" stroke-linecap="round"/>
  <!-- Bottom-left -->
  <path d="M32,440 Q44,454 56,446 M44,452 Q50,466 62,460 M52,462 Q60,474 72,466"
    stroke="#c9993a" stroke-width="2" fill="none" opacity="0.35" stroke-linecap="round"/>
  <!-- Bottom-right -->
  <path d="M480,440 Q468,454 456,446 M468,452 Q462,466 450,460 M460,462 Q452,474 440,466"
    stroke="#c9993a" stroke-width="2" fill="none" opacity="0.35" stroke-linecap="round"/>

</svg>