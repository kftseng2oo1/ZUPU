<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5a3318"/>
      <stop offset="100%" style="stop-color:#3a2008"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0d89a"/>
      <stop offset="100%" style="stop-color:#c9993a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Book pages -->
  <rect x="130" y="120" width="120" height="280" rx="8" fill="#f5ede3" opacity="0.9"/>
  <rect x="262" y="120" width="120" height="280" rx="8" fill="#f5ede3" opacity="0.9"/>
  <!-- Book spine -->
  <rect x="244" y="115" width="24" height="290" rx="4" fill="url(#gold)"/>
  <!-- Lines on left page -->
  <line x1="155" y1="175" x2="235" y2="175" stroke="#c4956a" stroke-width="4" stroke-linecap="round"/>
  <line x1="155" y1="205" x2="235" y2="205" stroke="#c4956a" stroke-width="4" stroke-linecap="round"/>
  <line x1="155" y1="235" x2="235" y2="235" stroke="#c4956a" stroke-width="4" stroke-linecap="round"/>
  <line x1="155" y1="265" x2="235" y2="265" stroke="#c4956a" stroke-width="4" stroke-linecap="round"/>
  <line x1="155" y1="295" x2="200" y2="295" stroke="#c4956a" stroke-width="4" stroke-linecap="round"/>
  <!-- Lines on right page -->
  <line x1="277" y1="175" x2="357" y2="175" stroke="#c4956a" stroke-width="4" stroke-linecap="round"/>
  <line x1="277" y1="205" x2="357" y2="205" stroke="#c4956a" stroke-width="4" stroke-linecap="round"/>
  <line x1="277" y1="235" x2="357" y2="235" stroke="#c4956a" stroke-width="4" stroke-linecap="round"/>
  <line x1="277" y1="265" x2="357" y2="265" stroke="#c4956a" stroke-width="4" stroke-linecap="round"/>
  <line x1="277" y1="295" x2="320" y2="295" stroke="#c4956a" stroke-width="4" stroke-linecap="round"/>
  <!-- Gold accent top -->
  <rect x="130" y="120" width="252" height="8" rx="4" fill="url(#gold)"/>
  <!-- Chinese character 譜 hint - decorative dots -->
  <circle cx="185" cy="345" r="5" fill="#c9993a" opacity="0.7"/>
  <circle cx="205" cy="345" r="5" fill="#c9993a" opacity="0.7"/>
  <circle cx="225" cy="345" r="5" fill="#c9993a" opacity="0.7"/>
  <circle cx="295" cy="345" r="5" fill="#c9993a" opacity="0.7"/>
  <circle cx="315" cy="345" r="5" fill="#c9993a" opacity="0.7"/>
  <circle cx="335" cy="345" r="5" fill="#c9993a" opacity="0.7"/>
  <!-- Bottom binding detail -->
  <rect x="130" y="388" width="252" height="12" rx="4" fill="url(#gold)" opacity="0.8"/>
</svg>
