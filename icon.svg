<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a1506"/>
      <stop offset="50%" style="stop-color:#3d1e08"/>
      <stop offset="100%" style="stop-color:#1a0d03"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5e6a0"/>
      <stop offset="40%" style="stop-color:#d4a832"/>
      <stop offset="100%" style="stop-color:#a07820"/>
    </linearGradient>
    <linearGradient id="goldH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b6018;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#d4a832"/>
      <stop offset="70%" style="stop-color:#d4a832"/>
      <stop offset="100%" style="stop-color:#8b6018;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="roofGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b6018"/>
      <stop offset="100%" style="stop-color:#5a3a08"/>
    </linearGradient>
    <linearGradient id="plaqueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b1a1a"/>
      <stop offset="100%" style="stop-color:#5a0808"/>
    </linearGradient>
    <radialGradient id="glowTop" cx="50%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:#d4a832;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#d4a832;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="512" height="512" rx="88" fill="url(#bgGrad)"/>
  <ellipse cx="256" cy="180" rx="200" ry="140" fill="url(#glowTop)"/>

  <!-- 屋頂 -->
  <polygon points="256,58 420,155 420,168 256,82 92,168 92,155" fill="url(#roofGrad)" opacity="0.95"/>
  <ellipse cx="256" cy="56" rx="12" ry="14" fill="url(#goldGrad)" filter="url(#glow)"/>
  <ellipse cx="256" cy="54" rx="6" ry="7" fill="#f5e6a0" opacity="0.9"/>
  <path d="M92,155 Q60,148 44,158" stroke="url(#goldGrad)" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M420,155 Q452,148 468,158" stroke="url(#goldGrad)" stroke-width="5" fill="none" stroke-linecap="round"/>
  <circle cx="44" cy="158" r="5" fill="url(#goldGrad)" filter="url(#softglow)"/>
  <circle cx="468" cy="158" r="5" fill="url(#goldGrad)" filter="url(#softglow)"/>
  <line x1="92" y1="168" x2="420" y2="168" stroke="url(#goldGrad)" stroke-width="3"/>
  <polygon points="256,172 400,240 400,250 256,186 112,250 112,240" fill="url(#roofGrad)" opacity="0.8"/>
  <line x1="112" y1="250" x2="400" y2="250" stroke="url(#goldGrad)" stroke-width="2"/>

  <!-- 廟柱 -->
  <rect x="120" y="250" width="22" height="175" rx="2" fill="url(#plaqueGrad)" opacity="0.9"/>
  <rect x="120" y="250" width="22" height="175" rx="2" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.6"/>
  <rect x="370" y="250" width="22" height="175" rx="2" fill="url(#plaqueGrad)" opacity="0.9"/>
  <rect x="370" y="250" width="22" height="175" rx="2" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.6"/>
  <rect x="116" y="246" width="30" height="8" rx="2" fill="url(#goldGrad)"/>
  <rect x="366" y="246" width="30" height="8" rx="2" fill="url(#goldGrad)"/>

  <!-- 匾額 -->
  <rect x="152" y="262" width="208" height="90" rx="6" fill="url(#plaqueGrad)"/>
  <rect x="152" y="262" width="208" height="90" rx="6" fill="none" stroke="url(#goldGrad)" stroke-width="3"/>
  <rect x="160" y="270" width="192" height="74" rx="4" fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.5"/>
  <text x="256" y="325" text-anchor="middle" font-family="serif" font-size="52" font-weight="bold" fill="url(#goldGrad)" filter="url(#softglow)">曾</text>

  <!-- 香爐區域 -->
  <rect x="142" y="362" width="228" height="62" rx="4" fill="#1a0d03" opacity="0.6"/>
  <rect x="142" y="362" width="228" height="62" rx="4" fill="none" stroke="url(#goldH)" stroke-width="1"/>
  <ellipse cx="256" cy="392" rx="28" ry="12" fill="#6b3a10"/>
  <rect x="234" y="380" width="44" height="14" rx="3" fill="#5a3008"/>
  <ellipse cx="256" cy="380" rx="22" ry="6" fill="#8b5018"/>
  <rect x="242" y="394" width="6" height="10" rx="2" fill="#5a3008"/>
  <rect x="264" y="394" width="6" height="10" rx="2" fill="#5a3008"/>
  <rect x="238" y="402" width="14" height="4" rx="1" fill="url(#goldGrad)" opacity="0.7"/>
  <rect x="260" y="402" width="14" height="4" rx="1" fill="url(#goldGrad)" opacity="0.7"/>

  <!-- 三柱香 -->
  <line x1="248" y1="338" x2="246" y2="381" stroke="#c8a050" stroke-width="2.5" opacity="0.9"/>
  <line x1="256" y1="332" x2="256" y2="381" stroke="#c8a050" stroke-width="2.5" opacity="0.9"/>
  <line x1="264" y1="338" x2="266" y2="381" stroke="#c8a050" stroke-width="2.5" opacity="0.9"/>
  <circle cx="246" cy="336" r="3.5" fill="#f0c040" filter="url(#glow)" opacity="0.95"/>
  <circle cx="256" cy="330" r="3.5" fill="#f0c040" filter="url(#glow)" opacity="0.95"/>
  <circle cx="266" cy="336" r="3.5" fill="#f0c040" filter="url(#glow)" opacity="0.95"/>
  <path d="M246,332 Q243,324 246,316 Q249,308 246,300" stroke="#d4a832" stroke-width="1.2" fill="none" opacity="0.35" stroke-linecap="round"/>
  <path d="M256,326 Q253,318 256,310 Q259,302 256,294" stroke="#d4a832" stroke-width="1.2" fill="none" opacity="0.35" stroke-linecap="round"/>
  <path d="M266,332 Q269,324 266,316 Q263,308 266,300" stroke="#d4a832" stroke-width="1.2" fill="none" opacity="0.35" stroke-linecap="round"/>

  <!-- 左燈籠（龍） -->
  <line x1="142" y1="250" x2="142" y2="272" stroke="url(#goldGrad)" stroke-width="1.5"/>
  <ellipse cx="142" cy="286" rx="14" ry="19" fill="#8b1a1a" stroke="url(#goldGrad)" stroke-width="1.5"/>
  <line x1="129" y1="278" x2="155" y2="278" stroke="url(#goldGrad)" stroke-width="1" opacity="0.5"/>
  <line x1="129" y1="284" x2="155" y2="284" stroke="url(#goldGrad)" stroke-width="1" opacity="0.5"/>
  <line x1="129" y1="290" x2="155" y2="290" stroke="url(#goldGrad)" stroke-width="1" opacity="0.5"/>
  <line x1="129" y1="296" x2="155" y2="296" stroke="url(#goldGrad)" stroke-width="1" opacity="0.5"/>
  <circle cx="142" cy="305" r="3" fill="url(#goldGrad)"/>
  <text x="142" y="292" text-anchor="middle" font-family="serif" font-size="13" fill="url(#goldGrad)" font-weight="bold">龍</text>

  <!-- 右燈籠（山） -->
  <line x1="370" y1="250" x2="370" y2="272" stroke="url(#goldGrad)" stroke-width="1.5"/>
  <ellipse cx="370" cy="286" rx="14" ry="19" fill="#8b1a1a" stroke="url(#goldGrad)" stroke-width="1.5"/>
  <line x1="357" y1="278" x2="383" y2="278" stroke="url(#goldGrad)" stroke-width="1" opacity="0.5"/>
  <line x1="357" y1="284" x2="383" y2="284" stroke="url(#goldGrad)" stroke-width="1" opacity="0.5"/>
  <line x1="357" y1="290" x2="383" y2="290" stroke="url(#goldGrad)" stroke-width="1" opacity="0.5"/>
  <line x1="357" y1="296" x2="383" y2="296" stroke="url(#goldGrad)" stroke-width="1" opacity="0.5"/>
  <circle cx="370" cy="305" r="3" fill="url(#goldGrad)"/>
  <text x="370" y="292" text-anchor="middle" font-family="serif" font-size="13" fill="url(#goldGrad)" font-weight="bold">山</text>

  <!-- 台階 -->
  <rect x="100" y="422" width="312" height="10" rx="2" fill="#2e1508" opacity="0.9"/>
  <rect x="100" y="422" width="312" height="10" rx="2" fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.5"/>
  <rect x="80"  y="430" width="352" height="9"  rx="2" fill="#261205" opacity="0.9"/>
  <rect x="80"  y="430" width="352" height="9"  rx="2" fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.35"/>
  <rect x="58"  y="437" width="396" height="9"  rx="2" fill="#1e0e04" opacity="0.9"/>

  <!-- 底部文字 -->
  <text x="256" y="472" text-anchor="middle" font-family="serif" font-size="16" letter-spacing="8" fill="url(#goldGrad)" opacity="0.9">龍山派</text>

  <!-- 四角祥雲 -->
  <path d="M30,80 Q38,68 50,74 Q46,60 58,62 Q54,50 66,54" stroke="url(#goldGrad)" stroke-width="1.8" fill="none" opacity="0.4" stroke-linecap="round"/>
  <path d="M482,80 Q474,68 462,74 Q466,60 454,62 Q458,50 446,54" stroke="url(#goldGrad)" stroke-width="1.8" fill="none" opacity="0.4" stroke-linecap="round"/>
  <path d="M30,432 Q38,444 50,438 Q46,452 58,450 Q54,462 66,458" stroke="url(#goldGrad)" stroke-width="1.8" fill="none" opacity="0.4" stroke-linecap="round"/>
  <path d="M482,432 Q474,444 462,438 Q466,452 454,450 Q458,462 446,458" stroke="url(#goldGrad)" stroke-width="1.8" fill="none" opacity="0.4" stroke-linecap="round"/>

  <!-- 雙層外框金邊 -->
  <rect x="3"  y="3"  width="506" height="506" rx="87" fill="none" stroke="url(#goldGrad)" stroke-width="3" opacity="0.75"/>
  <rect x="10" y="10" width="492" height="492" rx="82" fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.3"/>
</svg>
